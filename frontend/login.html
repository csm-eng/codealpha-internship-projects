<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="nav-brand">Shop<span>Ease</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item">Home</a></li>
                <li><a href="cart.html" class="nav-item cart-badge-wrapper">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
                <li><a href="orders.html" class="nav-item" id="navOrders" style="display: none;">My Orders</a></li>
                <li><a href="admin.html" class="nav-item" id="navAdmin" style="display: none;">Admin</a></li>
            </ul>
            <div class="nav-actions" id="navActions">
                <!-- Populated via JS -->
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2 class="form-title">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail" class="form-label">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Sign In
                </button>
            </form>
            <p class="form-footer-link">
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>

</body>

</html>
