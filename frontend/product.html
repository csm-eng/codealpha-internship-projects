<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="nav-brand">Shop<span>Ease</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item">Home</a></li>
                <li><a href="cart.html" class="nav-item cart-badge-wrapper">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
                <li><a href="orders.html" class="nav-item" id="navOrders" style="display: none;">My Orders</a></li>
                <li><a href="admin.html" class="nav-item" id="navAdmin" style="display: none;">Admin</a></li>
            </ul>
            <div class="nav-actions" id="navActions">
                <!-- Populated via JS -->
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Back Button -->
        <div style="margin: 25px 0 10px;">
            <a href="index.html" class="btn btn-secondary btn-sm" style="display: inline-flex; align-items: center; gap: 6px;">
                &larr; Back to Shop
            </a>
        </div>

        <!-- Product details container -->
        <div id="productDetailContainer">
            <!-- Loading Indicator -->
            <p style="text-align: center; padding: 40px 0; color: var(--text-muted);">Loading product details...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/product.js"></script>

</html>
