<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="nav-brand">Shop<span>Ease</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-item">Home</a></li>
                <li><a href="cart.html" class="nav-item cart-badge-wrapper active">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
                <li><a href="orders.html" class="nav-item" id="navOrders" style="display: none;">My Orders</a></li>
                <li><a href="admin.html" class="nav-item" id="navAdmin" style="display: none;">Admin</a></li>
            </ul>
            <div class="nav-actions" id="navActions">
                <!-- Populated via JS -->
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <h2 style="font-size: 2rem; margin-bottom: 20px; font-family: var(--font-heading);">Your Shopping Cart</h2>

        <div class="split-layout" id="cartLayout">
            <!-- Left Side: Cart Items -->
            <div class="split-main" id="cartItems">
                <!-- Loaded Dynamically -->
                <p style="text-align: center; color: var(--text-muted); padding: 40px 0;">Loading cart items...</p>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="split-sidebar">
                <div class="summary-card">
                    <h3 class="summary-title">Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summarySubtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color: var(--success); font-weight: 600;">FREE</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="summaryTotal">₹0</span>
                    </div>
                    <a href="checkout.html" style="display: block; margin-top: 20px;">
                        <button class="btn btn-primary" style="width: 100%; padding: 12px;">
                            Proceed to Checkout
                        </button>
                    </a>
                </div>
            </div>
        </div>

        <!-- Empty Cart message (Hidden by default) -->
        <div id="emptyCartMessage" style="display: none; text-align: center; padding: 60px 20px; background-color: var(--card-bg); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); max-width: 600px; margin: 40px auto;">
            <div style="font-size: 4rem; margin-bottom: 15px;">🛒</div>
            <h3 style="margin-bottom: 10px;">Your Cart is Empty</h3>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Looks like you haven't added anything to your cart yet.</p>
            <a href="index.html" class="btn btn-primary">Start Shopping</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>

</body>

</html>
